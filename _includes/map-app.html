<style>
	.map-widget {
		display: flex;
		flex-direction: column;
		gap: 12px;
		margin: 16px 0;
		font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
	}

	@media (min-width: 900px) {
		.map-widget { margin-right: -212px; }
	}

	.map-widget__controls {
		display: flex;
		flex-wrap: wrap;
		gap: 12px 16px;
		align-items: center;
		padding: 12px;
		background: #f7f7f7;
		border: 1px solid #e2e2e2;
		border-radius: 6px;
	}

	.map-widget__controls label {
		display: inline-flex;
		align-items: center;
		gap: 6px;
	}

	.map-widget__address-wrap {
		position: relative;
		flex: 1 1 220px;
		min-width: 180px;
	}

	.map-widget__address {
		width: 100%;
		box-sizing: border-box;
		padding: 6px 10px;
		border: 1px solid #ccc;
		border-radius: 4px;
		font-size: 14px;
	}

	.map-widget__suggestions {
		position: absolute;
		top: 100%;
		left: 0;
		right: 0;
		background: #fff;
		border: 1px solid #ccc;
		border-top: 0;
		border-radius: 0 0 4px 4px;
		max-height: 240px;
		overflow-y: auto;
		z-index: 5;
		margin: 0;
		padding: 0;
		list-style: none;
		box-shadow: 0 4px 10px rgba(0,0,0,0.08);
	}

	.map-widget__suggestions li {
		padding: 6px 10px;
		cursor: pointer;
		font-size: 14px;
	}

	.map-widget__suggestions li:hover,
	.map-widget__suggestions li[aria-selected="true"] {
		background: #eef3ff;
	}

	.map-widget__suggestions--hidden { display: none; }

	.map-widget__cat-dot {
		display: inline-block;
		width: 10px;
		height: 10px;
		border-radius: 50%;
		border: 1px solid rgba(0,0,0,0.15);
		margin-right: 2px;
		vertical-align: middle;
	}

	.map-widget__submit {
		padding: 6px 14px;
		background: #1f6feb;
		color: #fff;
		border: 0;
		border-radius: 4px;
		cursor: pointer;
		font-size: 14px;
	}

	.map-widget__submit:hover { background: #1558c4; }

	.map-widget__time { width: 160px; }

	.map-widget__body {
		display: flex;
		gap: 12px;
		align-items: stretch;
	}

	.map-widget__map {
		flex: 1 1 auto;
		min-width: 0;
		height: 60vh;
		min-height: 360px;
		border-radius: 6px;
		overflow: hidden;
	}

	.map-widget__categories {
		flex: 0 0 200px;
		display: flex;
		flex-direction: column;
		gap: 6px;
		border: 1px solid #e2e2e2;
		background: #f7f7f7;
		border-radius: 6px;
		padding: 10px 12px;
		margin: 0;
		max-height: 60vh;
		overflow-y: auto;
	}

	.map-widget__categories legend {
		font-weight: 600;
		font-size: 13px;
		padding: 0 0 4px 0;
	}

	@media (max-width: 640px) {
		.map-widget__body { flex-direction: column; }
		.map-widget__categories { flex: 0 0 auto; max-height: none; }
	}

	.map-widget__status {
		min-height: 18px;
		font-size: 13px;
		color: #555;
	}

	.map-widget__status--error { color: #b3261e; }

	.map-widget--missing-token {
		display: flex;
		align-items: center;
		justify-content: center;
		background: #f2f2f2;
		color: #444;
		padding: 24px;
		text-align: center;
		border-radius: 6px;
		min-height: 120px;
	}

	.map-widget__poi-popup { font-size: 13px; }
	.map-widget__poi-popup strong { display: block; margin-bottom: 2px; }

	.map-widget__metrics {
		display: flex;
		flex-wrap: wrap;
		gap: 8px;
	}

	.map-widget__metrics--hidden { display: none; }

	.map-widget__metric {
		flex: 1 1 180px;
		padding: 8px 12px;
		background: #f7f7f7;
		border: 1px solid #e2e2e2;
		border-radius: 6px;
		font-size: 13px;
		display: flex;
		align-items: baseline;
		justify-content: space-between;
		gap: 8px;
	}

	.map-widget__metric-label { color: #555; }
	.map-widget__metric-value { font-weight: 600; font-size: 14px; }
	.map-widget__metric-value--pending { color: #888; font-weight: 400; }
	.map-widget__metric-value--positive { color: #b3261e; }
	.map-widget__metric-value--negative { color: #2f9e44; }

	.map-widget__parking {
		display: flex;
		align-items: center;
		gap: 6px;
		font-size: 12px;
		color: #666;
		padding: 0 4px;
	}

	.map-widget__parking input[type="range"] { width: 100px; }
</style>

{%- assign mapbox_token = site.mapbox_access_token | default: "" -%}

{%- if mapbox_token == "" -%}
<div class="map-widget map-widget--missing-token">
	Missing Mapbox access token. Set <code>mapbox_access_token</code> in <code>_config.yml</code>.
</div>
{%- else -%}

<div class="map-widget" data-initial-lat="{{ page.map_lat | default: 41.88 }}" data-initial-lng="{{ page.map_lng | default: -87.65 }}" data-initial-zoom="{{ page.map_zoom | default: 12 }}" data-initial-time="{{ page.map_default_time_minutes | default: 20 }}">
	<form class="map-widget__controls" onsubmit="return false;">
		<div class="map-widget__address-wrap">
			<input type="text" class="map-widget__address" placeholder="Enter an address (e.g. 1600 Pennsylvania Ave, Washington, DC)" aria-label="Address" autocomplete="off" />
			<ul class="map-widget__suggestions map-widget__suggestions--hidden" role="listbox"></ul>
		</div>
		<button type="submit" class="map-widget__submit">Go</button>
		<label>
			One-way travel time:
			<input type="range" class="map-widget__time" min="5" max="45" step="5" value="20" />
			<span class="map-widget__time-readout">20 min</span>
		</label>
	</form>
	<div class="map-widget__parking">
		<label>
			Parking time:
			<input type="range" class="map-widget__parking-slider" min="0" max="20" step="1" value="5" />
			<span class="map-widget__parking-readout">5 min</span>
		</label>
	</div>
	<div class="map-widget__metrics map-widget__metrics--hidden" aria-live="polite">
		<div class="map-widget__metric">
			<span class="map-widget__metric-label">Walking vs cycling</span>
			<span class="map-widget__metric-value map-widget__metric-value--walk">—</span>
		</div>
		<div class="map-widget__metric">
			<span class="map-widget__metric-label">Driving vs cycling</span>
			<span class="map-widget__metric-value map-widget__metric-value--drive">—</span>
		</div>
	</div>
	<div class="map-widget__body">
		<div class="map-widget__map" id="post-map"></div>
		<fieldset class="map-widget__categories">
			<legend>Categories</legend>
			<label><input type="checkbox" value="grocery" checked> Groceries</label>
			<label><input type="checkbox" value="restaurant" checked> Restaurants</label>
			<label><input type="checkbox" value="coffee" checked> Coffee</label>
			<label><input type="checkbox" value="cafe"> Cafes</label>
			<label><input type="checkbox" value="bakery"> Bakeries</label>
			<label><input type="checkbox" value="bar"> Bars</label>
			<label><input type="checkbox" value="farmers_market"> Farmers markets</label>
			<label><input type="checkbox" value="park" checked> Parks</label>
			<label><input type="checkbox" value="school"> Schools</label>
			<label><input type="checkbox" value="playground"> Playgrounds</label>
			<label><input type="checkbox" value="fitness_center"> Gyms</label>
			<label><input type="checkbox" value="shopping" checked> Shopping</label>
			<label><input type="checkbox" value="pharmacy"> Pharmacies</label>
			<label><input type="checkbox" value="post_office"> Post offices</label>
			<label><input type="checkbox" value="hardware_store"> Hardware stores</label>
			<label><input type="checkbox" value="library" checked> Libraries</label>
			<label><input type="checkbox" value="cinema" checked> Cinemas</label>
			<label><input type="checkbox" value="museum"> Museums</label>
		</fieldset>
	</div>
	<div class="map-widget__status" role="status" aria-live="polite"></div>
</div>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@7.1.0/turf.min.js"></script>

<script>
(function () {
	var widget = document.querySelector(".map-widget");
	if (!widget || typeof mapboxgl === "undefined") return;

	var token = "{{ mapbox_token }}";
	mapboxgl.accessToken = token;

	var initialCenter = [
		parseFloat(widget.dataset.initialLng),
		parseFloat(widget.dataset.initialLat)
	];
	var initialZoom = parseFloat(widget.dataset.initialZoom);
	var initialTime = parseFloat(widget.dataset.initialTime);

	var addressInput = widget.querySelector(".map-widget__address");
	var suggestionsEl = widget.querySelector(".map-widget__suggestions");
	var submitBtn = widget.querySelector(".map-widget__submit");
	var form = widget.querySelector(".map-widget__controls");
	var timeSlider = widget.querySelector(".map-widget__time");
	var timeReadout = widget.querySelector(".map-widget__time-readout");
	var categoryBoxes = Array.prototype.slice.call(
		widget.querySelectorAll(".map-widget__categories input[type='checkbox']")
	);
	var statusEl = widget.querySelector(".map-widget__status");
	var metricsEl = widget.querySelector(".map-widget__metrics");
	var walkValueEl = widget.querySelector(".map-widget__metric-value--walk");
	var driveValueEl = widget.querySelector(".map-widget__metric-value--drive");
	var parkingSlider = widget.querySelector(".map-widget__parking-slider");
	var parkingReadout = widget.querySelector(".map-widget__parking-readout");
	var parkingMinutes = parseFloat(parkingSlider.value);

	parkingSlider.addEventListener("input", function () {
		parkingMinutes = parseFloat(parkingSlider.value);
		parkingReadout.textContent = Math.round(parkingMinutes) + " min";
		var cached = state.boundaryKey ? matrixCache.get(state.boundaryKey) : null;
		if (cached) renderMetrics(cached);
	});

	timeSlider.value = String(initialTime);
	timeReadout.textContent = Math.round(initialTime) + " min";

	var ROUTING_PROFILE = "cycling";

	var CATEGORY_COLORS = {
		coffee: "#8b5a2b",
		restaurant: "#d9480f",
		park: "#2f9e44",
		bar: "#9c36b5",
		grocery: "#1971c2",
		school: "#f08c00",
		fitness_center: "#e03131",
		shopping: "#c2255c",
		pharmacy: "#12b886",
		library: "#5f3dc4",
		bakery: "#c97a2b",
		post_office: "#495057",
		cafe: "#a0522d",
		playground: "#37b24d",
		hardware_store: "#5c940d",
		farmers_market: "#e8590c",
		cinema: "#7048e8",
		museum: "#0b7285"
	};

	categoryBoxes.forEach(function (box) {
		var color = CATEGORY_COLORS[box.value] || "#444";
		var dot = document.createElement("span");
		dot.className = "map-widget__cat-dot";
		dot.style.background = color;
		box.parentNode.insertBefore(dot, box.nextSibling);
	});

	var state = {
		center: initialCenter.slice(),
		timeMinutes: initialTime,
		hasGeocoded: false,
		boundary: null,
		boundaryKey: null
	};

	var isoCache = new Map();

	var cache = new Map();

	var isoRequestSeq = 0;

	var matrixCache = new Map();

	var matrixRequestSeq = 0;

	var sessionToken = (function () {
		if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
		return "s-" + Date.now() + "-" + Math.random().toString(36).slice(2);
	})();

	var suggestions = [];
	var activeSuggestion = -1;
	var suggestSeq = 0;

	function setStatus(msg, isError) {
		statusEl.textContent = msg || "";
		statusEl.classList.toggle("map-widget__status--error", !!isError);
	}

	var map = new mapboxgl.Map({
		container: "post-map",
		style: "mapbox://styles/mapbox/streets-v12",
		center: initialCenter,
		zoom: initialZoom
	});

	map.addControl(new mapboxgl.NavigationControl(), "top-right");

	var centerMarker = null;

	function setCenterMarker(lngLat, label) {
		if (!centerMarker) {
			centerMarker = new mapboxgl.Marker({ color: "#1f6feb" })
				.setLngLat(lngLat)
				.addTo(map);
		} else {
			centerMarker.setLngLat(lngLat);
		}
		if (label) {
			centerMarker.setPopup(
				new mapboxgl.Popup({ offset: 24 }).setHTML(
					'<div class="map-widget__poi-popup"><strong>' + escapeHtml(label) + '</strong></div>'
				)
			);
		}
	}

	map.on("error", function (e) {
		var err = e && e.error;
		var msg = err && err.message ? err.message : "Unknown map error";
		var status = err && err.status ? " [HTTP " + err.status + "]" : "";
		console.error("Mapbox error:", err);
		setStatus("Map error" + status + ": " + msg, true);
	});

	map.on("load", function () {
		map.addSource("circle", { type: "geojson", data: emptyFC() });
		map.addLayer({
			id: "circle-fill",
			type: "fill",
			source: "circle",
			paint: { "fill-color": "#1f6feb", "fill-opacity": 0.12 }
		});
		map.addLayer({
			id: "circle-line",
			type: "line",
			source: "circle",
			paint: { "line-color": "#1f6feb", "line-width": 2 }
		});

		categoryBoxes.forEach(function (box) {
			var cat = box.value;
			map.addSource("pois-" + cat, { type: "geojson", data: emptyFC() });
			map.addLayer({
				id: "pois-" + cat,
				type: "circle",
				source: "pois-" + cat,
				paint: {
					"circle-radius": 6,
					"circle-color": CATEGORY_COLORS[cat] || "#444",
					"circle-stroke-color": "#fff",
					"circle-stroke-width": 1.5
				}
			});

			map.on("click", "pois-" + cat, function (e) {
				var f = e.features && e.features[0];
				if (!f) return;
				new mapboxgl.Popup()
					.setLngLat(f.geometry.coordinates)
					.setHTML(
						'<div class="map-widget__poi-popup">' +
						'<strong>' + escapeHtml(f.properties.name || "(unnamed)") + '</strong>' +
						escapeHtml(f.properties.category || cat) +
						'</div>'
					)
					.addTo(map);
			});
			map.on("mouseenter", "pois-" + cat, function () { map.getCanvas().style.cursor = "pointer"; });
			map.on("mouseleave", "pois-" + cat, function () { map.getCanvas().style.cursor = ""; });
		});
	});

	form.addEventListener("submit", function (e) {
		e.preventDefault();
		var addr = addressInput.value.trim();
		if (!addr) return;
		geocodeAndUpdate(addr);
	});
	submitBtn.addEventListener("click", function (e) {
		e.preventDefault();
		form.dispatchEvent(new Event("submit"));
	});

	var debouncedRefresh = debounce(function () {
		if (!state.hasGeocoded) return;
		redrawIsochrone().then(function () {
			refreshAllPois();
			updateTravelMetrics();
			setStatus("");
		}).catch(function () {});
	}, 300);

	timeSlider.addEventListener("input", function () {
		state.timeMinutes = parseFloat(timeSlider.value);
		timeReadout.textContent = Math.round(state.timeMinutes) + " min";
		debouncedRefresh();
	});

	categoryBoxes.forEach(function (box) {
		box.addEventListener("change", function () {
			var cat = box.value;
			if (box.checked) {
				if (state.hasGeocoded) fetchCategory(cat);
			} else {
				var src = map.getSource("pois-" + cat);
				if (src) src.setData(emptyFC());
			}
		});
	});

	function applyResolvedLocation(lngLat, label) {
		state.center = lngLat;
		state.hasGeocoded = true;
		setCenterMarker(state.center, label);
		map.flyTo({ center: state.center, zoom: Math.max(map.getZoom(), 13) });
		return redrawIsochrone().then(function () {
			refreshAllPois();
			updateTravelMetrics();
			setStatus(label ? "Showing results near " + label : "");
		}).catch(function () {});
	}

	function hideSuggestions() {
		suggestionsEl.classList.add("map-widget__suggestions--hidden");
		suggestionsEl.innerHTML = "";
		suggestions = [];
		activeSuggestion = -1;
	}

	function renderSuggestions() {
		suggestionsEl.innerHTML = "";
		if (!suggestions.length) {
			hideSuggestions();
			return;
		}
		suggestions.forEach(function (s, i) {
			var li = document.createElement("li");
			li.setAttribute("role", "option");
			li.setAttribute("data-index", String(i));
			var primary = s.name || s.place_formatted || "";
			var secondary = s.place_formatted && s.place_formatted !== primary ? s.place_formatted : "";
			li.innerHTML = '<strong>' + escapeHtml(primary) + '</strong>' +
				(secondary ? '<div style="color:#666;font-size:12px;">' + escapeHtml(secondary) + '</div>' : '');
			if (i === activeSuggestion) li.setAttribute("aria-selected", "true");
			li.addEventListener("mousedown", function (ev) {
				ev.preventDefault();
				selectSuggestion(i);
			});
			suggestionsEl.appendChild(li);
		});
		suggestionsEl.classList.remove("map-widget__suggestions--hidden");
	}

	function fetchSuggestions(q) {
		var mySeq = ++suggestSeq;
		var url = "https://api.mapbox.com/search/searchbox/v1/suggest" +
			"?q=" + encodeURIComponent(q) +
			"&limit=5" +
			"&session_token=" + encodeURIComponent(sessionToken) +
			"&proximity=" + state.center[0] + "," + state.center[1] +
			"&access_token=" + encodeURIComponent(token);
		fetch(url)
			.then(function (r) { return r.ok ? r.json() : null; })
			.then(function (data) {
				if (mySeq !== suggestSeq || !data) return;
				suggestions = data.suggestions || [];
				activeSuggestion = -1;
				renderSuggestions();
			})
			.catch(function (err) { console.error("Suggest failed:", err); });
	}

	var debouncedSuggest = debounce(function (q) { fetchSuggestions(q); }, 200);

	function selectSuggestion(i) {
		var s = suggestions[i];
		if (!s) return;
		var label = s.place_formatted || s.name || "";
		addressInput.value = label;
		hideSuggestions();
		setStatus("Finding address…");
		var url = "https://api.mapbox.com/search/searchbox/v1/retrieve/" +
			encodeURIComponent(s.mapbox_id) +
			"?session_token=" + encodeURIComponent(sessionToken) +
			"&access_token=" + encodeURIComponent(token);
		fetch(url)
			.then(function (r) {
				if (!r.ok) {
					return r.text().then(function (body) {
						throw new Error("HTTP " + r.status + " – " + body.slice(0, 200));
					});
				}
				return r.json();
			})
			.then(function (data) {
				var f = data && data.features && data.features[0];
				if (!f || !f.geometry) {
					setStatus("Could not retrieve that address.", true);
					return;
				}
				var resolvedLabel = (f.properties && (f.properties.full_address || f.properties.place_formatted || f.properties.name)) || label;
				applyResolvedLocation(f.geometry.coordinates, resolvedLabel);
			})
			.catch(function (err) {
				console.error("Retrieve failed:", err);
				setStatus("Address lookup failed: " + err.message, true);
			});
	}

	addressInput.addEventListener("input", function () {
		var q = addressInput.value.trim();
		if (q.length < 2) { hideSuggestions(); return; }
		debouncedSuggest(q);
	});

	addressInput.addEventListener("keydown", function (e) {
		var visible = !suggestionsEl.classList.contains("map-widget__suggestions--hidden");
		if (e.key === "ArrowDown" && visible && suggestions.length) {
			e.preventDefault();
			activeSuggestion = (activeSuggestion + 1) % suggestions.length;
			renderSuggestions();
		} else if (e.key === "ArrowUp" && visible && suggestions.length) {
			e.preventDefault();
			activeSuggestion = (activeSuggestion - 1 + suggestions.length) % suggestions.length;
			renderSuggestions();
		} else if (e.key === "Enter") {
			if (visible && activeSuggestion >= 0) {
				e.preventDefault();
				selectSuggestion(activeSuggestion);
			}
		} else if (e.key === "Escape") {
			hideSuggestions();
		}
	});

	addressInput.addEventListener("blur", function () {
		setTimeout(hideSuggestions, 150);
	});

	function reverseGeocodeAndPlace(lngLat) {
		setStatus("Looking up location…");
		var url = "https://api.mapbox.com/geocoding/v5/mapbox.places/" +
			lngLat[0] + "," + lngLat[1] +
			".json?limit=1&access_token=" + encodeURIComponent(token);
		fetch(url)
			.then(function (r) { return r.ok ? r.json() : null; })
			.then(function (data) {
				var label;
				if (data && data.features && data.features[0]) {
					label = data.features[0].place_name;
				} else {
					label = lngLat[0].toFixed(5) + ", " + lngLat[1].toFixed(5);
				}
				addressInput.value = label;
				applyResolvedLocation(lngLat, label);
			})
			.catch(function (err) {
				console.error("Reverse geocode failed:", err);
				var label = lngLat[0].toFixed(5) + ", " + lngLat[1].toFixed(5);
				addressInput.value = label;
				applyResolvedLocation(lngLat, label);
			});
	}

	map.doubleClickZoom.disable();
	map.on("dblclick", function (e) {
		e.preventDefault();
		var poiLayerIds = categoryBoxes.map(function (b) { return "pois-" + b.value; })
			.filter(function (id) { return !!map.getLayer(id); });
		if (poiLayerIds.length) {
			var hits = map.queryRenderedFeatures(e.point, { layers: poiLayerIds });
			if (hits && hits.length) return;
		}
		reverseGeocodeAndPlace([e.lngLat.lng, e.lngLat.lat]);
	});

	function geocodeAndUpdate(addr) {
		setStatus("Finding address…");
		var url =
			"https://api.mapbox.com/geocoding/v5/mapbox.places/" +
			encodeURIComponent(addr) +
			".json?limit=1&access_token=" +
			encodeURIComponent(token);
		fetch(url)
			.then(function (r) {
				if (!r.ok) {
					return r.text().then(function (body) {
						throw new Error("HTTP " + r.status + " " + r.statusText + " – " + body.slice(0, 200));
					});
				}
				return r.json();
			})
			.then(function (data) {
				if (!data.features || !data.features.length) {
					setStatus("No match for that address.", true);
					return;
				}
				var f = data.features[0];
				applyResolvedLocation(f.center, f.place_name || addr);
			})
			.catch(function (err) {
				console.error("Geocoding failed:", err);
				setStatus("Geocoding failed: " + err.message, true);
			});
	}

	function redrawIsochrone() {
		var centerKey = state.center.map(round5).join(",");
		var timeKey = String(Math.round(state.timeMinutes));
		var key = "iso|" + ROUTING_PROFILE + "|" + centerKey + "|" + timeKey;
		var reqId = ++isoRequestSeq;
		if (isoCache.has(key)) {
			var cached = isoCache.get(key);
			state.boundary = cached;
			state.boundaryKey = key;
			map.getSource("circle").setData(cached);
			return Promise.resolve(cached);
		}
		var minutes = Math.max(1, Math.min(60, Math.round(state.timeMinutes)));
		var params = [
			"contours_minutes=" + minutes,
			"polygons=true",
			"denoise=1",
			"generalize=50",
			"access_token=" + encodeURIComponent(token)
		];
		var url = "https://api.mapbox.com/isochrone/v1/mapbox/" + ROUTING_PROFILE +
			"/" + state.center[0] + "," + state.center[1] + "?" + params.join("&");
		setStatus("Computing reachable area…");
		return fetch(url)
			.then(function (r) {
				if (!r.ok) {
					return r.text().then(function (body) {
						throw new Error("HTTP " + r.status + " " + r.statusText + " – " + body.slice(0, 200));
					});
				}
				return r.json();
			})
			.then(function (data) {
				var fc = (data && data.type === "FeatureCollection") ? data : emptyFC();
				isoCache.set(key, fc);
				if (reqId !== isoRequestSeq) return fc;
				state.boundary = fc;
				state.boundaryKey = key;
				map.getSource("circle").setData(fc);
				return fc;
			})
			.catch(function (err) {
				console.error("Isochrone fetch failed:", err);
				if (reqId === isoRequestSeq) {
					setStatus("Reachable-area fetch failed: " + err.message, true);
				}
				throw err;
			});
	}

	function boundaryPolygon() {
		var fc = state.boundary;
		if (!fc || !fc.features || !fc.features.length) return null;
		return fc.features[0];
	}

	function refreshAllPois() {
		categoryBoxes.forEach(function (box) {
			if (box.checked) fetchCategory(box.value);
		});
	}

	function sampleBoundaryPoints(polyFeature, n) {
		var geom = polyFeature && polyFeature.geometry;
		if (!geom) return [];
		var ring;
		if (geom.type === "Polygon") {
			ring = geom.coordinates[0];
		} else if (geom.type === "MultiPolygon") {
			var best = null;
			geom.coordinates.forEach(function (poly) {
				if (!best || poly[0].length > best.length) best = poly[0];
			});
			ring = best;
		} else {
			return [];
		}
		if (!ring || ring.length < 2) return [];
		var usable = ring.length - 1;
		var count = Math.min(n, usable);
		var step = Math.max(1, Math.floor(usable / count));
		var out = [];
		for (var i = 0; i < usable && out.length < count; i += step) {
			out.push(ring[i]);
		}
		return out;
	}

	function fetchMeanDuration(profile, samples) {
		if (!samples.length) return Promise.resolve(null);
		var coords = [state.center].concat(samples).map(function (c) {
			return round5(c[0]) + "," + round5(c[1]);
		}).join(";");
		var url = "https://api.mapbox.com/directions-matrix/v1/mapbox/" + profile +
			"/" + coords +
			"?sources=0&annotations=duration&access_token=" + encodeURIComponent(token);
		return fetch(url)
			.then(function (r) { return r.ok ? r.json() : null; })
			.then(function (data) {
				if (!data || !data.durations || !data.durations[0]) return null;
				var row = data.durations[0];
				var sum = 0, n = 0;
				for (var i = 1; i < row.length; i++) {
					if (typeof row[i] === "number" && isFinite(row[i])) {
						sum += row[i];
						n++;
					}
				}
				return n ? (sum / n) / 60 : null;
			})
			.catch(function (err) {
				console.error("Matrix (" + profile + ") failed:", err);
				return null;
			});
	}

	function formatWalkPenalty(min) {
		var v = Math.round(min);
		if (v < 0) return "−" + Math.abs(v) + " min";
		if (v > 0) return "+" + v + " min";
		return "~same as cycling";
	}

	function formatDriveDelta(min) {
		var v = Math.round(min);
		if (v < 0) return "−" + Math.abs(v) + " min";
		if (v > 0) return "+" + v + " min";
		return "~same as cycling";
	}

	function setMetricPending() {
		metricsEl.classList.remove("map-widget__metrics--hidden");
		walkValueEl.textContent = "…";
		driveValueEl.textContent = "…";
		walkValueEl.classList.add("map-widget__metric-value--pending");
		driveValueEl.classList.add("map-widget__metric-value--pending");
	}

	function updateTravelMetrics() {
		var polyFeature = boundaryPolygon();
		if (!polyFeature) {
			metricsEl.classList.add("map-widget__metrics--hidden");
			return;
		}
		var key = state.boundaryKey;
		var reqId = ++matrixRequestSeq;
		if (matrixCache.has(key)) {
			renderMetrics(matrixCache.get(key));
			return;
		}
		setMetricPending();
		var samples = sampleBoundaryPoints(polyFeature, 24);
		Promise.all([
			fetchMeanDuration("walking", samples),
			fetchMeanDuration("driving", samples)
		]).then(function (results) {
			if (reqId !== matrixRequestSeq || key !== state.boundaryKey) return;
			var entry = {
				walk: results[0],
				drive: results[1],
				baseMinutes: state.timeMinutes
			};
			matrixCache.set(key, entry);
			renderMetrics(entry);
		});
	}

	function setMetricColor(el, delta) {
		el.classList.remove("map-widget__metric-value--positive", "map-widget__metric-value--negative");
		var v = Math.round(delta);
		if (v > 0) el.classList.add("map-widget__metric-value--positive");
		else if (v < 0) el.classList.add("map-widget__metric-value--negative");
	}

	function renderMetrics(entry) {
		metricsEl.classList.remove("map-widget__metrics--hidden");
		walkValueEl.classList.remove("map-widget__metric-value--pending");
		driveValueEl.classList.remove("map-widget__metric-value--pending");
		if (typeof entry.walk === "number") {
			var walkDelta = entry.walk - entry.baseMinutes;
			walkValueEl.textContent = formatWalkPenalty(walkDelta);
			setMetricColor(walkValueEl, walkDelta);
		} else {
			walkValueEl.textContent = "unavailable";
			walkValueEl.classList.add("map-widget__metric-value--pending");
			setMetricColor(walkValueEl, 0);
		}
		if (typeof entry.drive === "number") {
			var driveDelta = entry.drive + parkingMinutes - entry.baseMinutes;
			driveValueEl.textContent = formatDriveDelta(driveDelta);
			setMetricColor(driveValueEl, driveDelta);
		} else {
			driveValueEl.textContent = "unavailable";
			driveValueEl.classList.add("map-widget__metric-value--pending");
			setMetricColor(driveValueEl, 0);
		}
	}

	function fetchCategory(cat) {
		var polyFeature = boundaryPolygon();
		if (!polyFeature) return;
		var key = cat + "|" + state.boundaryKey;
		if (cache.has(key)) {
			applyPoiData(cat, cache.get(key));
			return;
		}
		var bbox = turf.bbox(polyFeature);
		var url =
			"https://api.mapbox.com/search/searchbox/v1/category/" +
			encodeURIComponent(cat) +
			"?proximity=" + state.center[0] + "," + state.center[1] +
			"&bbox=" + bbox.join(",") +
			"&limit=25" +
			"&access_token=" + encodeURIComponent(token);
		fetch(url)
			.then(function (r) {
				if (!r.ok) {
					return r.text().then(function (body) {
						throw new Error("HTTP " + r.status + " on category " + cat + " – " + body.slice(0, 200));
					});
				}
				return r.json();
			})
			.then(function (data) {
				var features = (data.features || []).filter(function (f) {
					if (!f.geometry || f.geometry.type !== "Point") return false;
					return turf.booleanPointInPolygon(
						turf.point(f.geometry.coordinates),
						polyFeature
					);
				}).map(function (f) {
					return {
						type: "Feature",
						geometry: f.geometry,
						properties: {
							name: f.properties && f.properties.name,
							category: cat
						}
					};
				});
				var fc = { type: "FeatureCollection", features: features };
				cache.set(key, fc);
				applyPoiData(cat, fc);
			})
			.catch(function (err) {
				console.error("POI fetch failed:", err);
				setStatus("POI fetch failed: " + err.message, true);
			});
	}

	function applyPoiData(cat, fc) {
		var src = map.getSource("pois-" + cat);
		if (src) src.setData(fc);
	}

	function emptyFC() {
		return { type: "FeatureCollection", features: [] };
	}

	function debounce(fn, ms) {
		var t = null;
		return function () {
			var args = arguments, self = this;
			clearTimeout(t);
			t = setTimeout(function () { fn.apply(self, args); }, ms);
		};
	}

	function round5(n) { return Math.round(n * 1e5) / 1e5; }

	function escapeHtml(s) {
		return String(s == null ? "" : s)
			.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
			.replace(/"/g, "&quot;").replace(/'/g, "&#39;");
	}
})();
</script>
