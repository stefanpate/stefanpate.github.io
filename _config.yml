# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: StefaNN
email: stefanpate94@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Stefan Pate's personal website and blog.
url: https://stefanpate.github.io # the base hostname & protocol for your site, e.g. http://example.com
domain: stefanpate.github.io
github_username: stefanpate
repository: stefanpate/stefanpate.github.io
linkedin_username: stefanpate3000
scholar_url: https://scholar.google.com/citations?user=SyYXMY4AAAAJ&hl=en

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed

# Dev server settings (affects `jekyll serve`, not builds)
host: localhost

# API keys
# Empty by default. For local dev, set in `_config.local.yml` (gitignored) and run:
#   bundle exec jekyll serve --config _config.yml,_config.local.yml
# For production, the GitHub Actions workflow injects MAPBOX_ACCESS_TOKEN from a repo secret.
mapbox_access_token: ""

exclude:
  - Gemfile
  - Gemfile.lock
  - Makefile
  - README.md
  - vendor/
  - node_modules/
  - .github/
